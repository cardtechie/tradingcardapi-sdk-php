name: Feature request
description: Suggest an idea or enhancement for the SDK
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For open-ended ideas, consider
        starting a thread in
        [Discussions](https://github.com/cardtechie/tradingcardapi-sdk-php/discussions)
        instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Is your request related to a frustration?
      placeholder: I'm always frustrated when '...'
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change or feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or screenshots about the request.
    validations:
      required: false
