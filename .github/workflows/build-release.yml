name: "Build and Release"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  version:
    name: "Generate Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Make build scripts executable
        run: chmod +x build/*.sh

      - name: Generate version
        id: version
        run: |
          # For push events, explicitly use the branch name from context
          BRANCH_NAME="${{ github.ref_name }}"
          if [[ -n "$BRANCH_NAME" ]]; then
            VERSION=$(bash build/version.sh --branch="$BRANCH_NAME")
          else
            VERSION=$(bash build/version.sh)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          # Determine if this is a release version (not dev/beta/rc)
          IS_RELEASE=false
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_RELEASE=true
          fi
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          
          # Should we create a release?
          SHOULD_RELEASE=false
          if [[ "$GITHUB_REF" == "refs/heads/main" && "$IS_RELEASE" == "true" ]]; then
            SHOULD_RELEASE=true
          elif [[ "$GITHUB_REF" == "refs/heads/develop" && "$VERSION" =~ \.beta- ]]; then
            SHOULD_RELEASE=true
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            SHOULD_RELEASE=true
          fi
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          
          echo "Generated version: $VERSION"
          echo "Is release: $IS_RELEASE"  
          echo "Should release: $SHOULD_RELEASE"

  test:
    name: "Run Tests"
    uses: ./.github/workflows/run-tests.yml

  release:
    name: "Create Release"
    runs-on: ubuntu-latest
    needs: [version, test]
    if: needs.version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Make build scripts executable
        run: chmod +x build/*.sh

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Generating release notes for version: $VERSION"
          
          # Set Claude API key if provided
          if [[ -n "${{ secrets.CLAUDE_API_KEY }}" ]]; then
            export CLAUDE_API_KEY="${{ secrets.CLAUDE_API_KEY }}"
          fi
          
          # Generate release notes
          RELEASE_NOTES=$(bash build/generate-release-notes.sh "$VERSION")
          
          # Save to file for GitHub release
          echo "$RELEASE_NOTES" > release_notes.md
          
          # Set output for use in release creation
          {
            echo "notes<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.version.outputs.version }}
          release_name: ${{ needs.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ needs.version.outputs.is_release != 'true' }}

  packagist:
    name: "Update Packagist"
    runs-on: ubuntu-latest
    needs: [version, release]
    if: needs.version.outputs.is_release == 'true' && github.ref == 'refs/heads/main'
    steps:
      - name: Update Packagist
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/cardtechie/tradingcardapi-sdk-php"}}' \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            || echo "Packagist update failed or not configured"

  notify:
    name: "Notify Success" 
    runs-on: ubuntu-latest
    needs: [version, test, release]
    if: always() && needs.version.outputs.should_release == 'true'
    steps:
      - name: Release Summary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          IS_RELEASE="${{ needs.version.outputs.is_release }}"
          
          {
            echo "## 🚀 Release Summary"
            echo ""
            echo "- **Version**: $VERSION"
            echo "- **Type**: $([ "$IS_RELEASE" = "true" ] && echo "Stable Release" || echo "Pre-release")"
            echo "- **Branch**: ${{ github.ref_name }}"
            echo "- **Tests**: ${{ needs.test.result }}"
            echo "- **Release**: ${{ needs.release.result }}"
            echo ""
            echo "### 📦 Installation"
            echo '```bash'
            echo "composer require cardtechie/tradingcardapi-sdk-php:^$VERSION"
            echo '```'
            echo ""
            echo "🔗 **Links:**"
            echo "- [Release](https://github.com/cardtechie/tradingcardapi-sdk-php/releases/tag/$VERSION)"
            echo "- [Packagist](https://packagist.org/packages/cardtechie/tradingcardapi-sdk-php)"
            echo "- [Changelog](https://github.com/cardtechie/tradingcardapi-sdk-php/blob/main/CHANGELOG.md)"
          } >> "$GITHUB_STEP_SUMMARY"